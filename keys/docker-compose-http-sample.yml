# this file has example values — copy, edit, then rename to docker-compose.yml
#
# Each secret listed under services.keys.secrets must have a matching entry
# in the top-level secrets block pointing to a file on the host.
# Create the files before starting: echo -n "<token>" > ./secrets/github_token

secrets:
  github_token:
    file: ./secrets/github_token
  # datadog_api_key:
  #   file: ./secrets/datadog_api_key
  # datadog_app_key:
  #   file: ./secrets/datadog_app_key

services:
  keys:
    container_name: keys-http
    image: ghcr.io/rthomazel/mcp/keys:latest
    stdin_open: true
    tty: false
    ports:
      - "8001:8001"
    environment:
      # mcpo: OpenAI-compatible REST API (for Open WebUI and similar)
      # KEYS_MCP_TRANSPORT: mcpo
      # mcp-proxy: native MCP/SSE (for LibreChat, Claude Desktop, MCP-native clients)
      KEYS_MCP_TRANSPORT: mcp-proxy
    volumes:
      # >>> copy config.yaml from the repo, fill in your secret names, then mount it <<<
      - ./config.yaml:/etc/keys/config.yaml:ro
    secrets:
      - github_token
      # - datadog_api_key
      # - datadog_app_key
    user: "9999:9999"

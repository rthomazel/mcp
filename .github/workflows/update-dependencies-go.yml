name: Update Go dependencies

on:
  schedule:
    - cron: "0 12 * * 1" # Monday 12:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    concurrency:
      group: update-dependencies-go-${{ matrix.module }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    strategy:
      matrix:
        module: [bench, keys, postgres]

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          # Full history needed so git diff against origin/main works in create-pr
          fetch-depth: 0

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: ${{ matrix.module }}/go.mod

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Detect Go version
        id: detect-go-version
        working-directory: ${{ matrix.module }}
        run: ../bin/detect-go-version

      - name: Update dependencies
        env:
          NEEDS_GO_UPDATE: ${{ steps.detect-go-version.outputs.needs_go_update }}
          LATEST_GO_MINOR: ${{ steps.detect-go-version.outputs.latest_go_minor }}
          LATEST_GO_FULL: ${{ steps.detect-go-version.outputs.latest_go_full }}
        working-directory: ${{ matrix.module }}
        run: ../bin/update-deps

      - name: Create PR
        env:
          # GH_TOKEN is the environment variable the gh CLI reads by default
          # for authentication. Use the built-in GITHUB_TOKEN (not the App
          # token) so that gh api POST /pulls is authorized. The workflow
          # declares pull-requests: write above, which grants this token that
          # scope.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BRANCH: chore/update-dependencies-go-${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: ../bin/create-pr

# postgres-mcp configuration
# Copy to ~/.config/github.com.rthomazel/mcp/postgres-config.yaml and edit before starting the server.
# That path is gitignored — this sample is safe to commit.

# PostgreSQL connection string (required)
dsn: postgres://user:password@localhost:5432/dbname

# Per-query timeout (Go duration string: 30s, 1m, etc.)
query_timeout: 30s

# Maximum rows returned per query. Protects the agent context window.
# Rows are streamed and collection stops at this limit, not truncated after fetch.
max_rows: 100

# Default schema used when the schema parameter is omitted.
default_schema: public

# Allow data mutations (INSERT, UPDATE, DELETE, TRUNCATE).
# The real enforcement boundary is the database user's grants.
allow_mutate: false

# Allow schema changes (CREATE, ALTER, DROP).
allow_mutate_schema: false

# Allow permission changes (GRANT, REVOKE).
allow_mutate_permissions: false

# Allow execute_batch and dry_run.
# Class flags (allow_mutate etc.) still apply per statement inside a batch.
allow_transactions: false

# Allow explain, active_connections, active_locks.
# These tools expose query text, usernames, and client addresses.
allow_diagnostics: false

# Allow explain_analyze (executes the inner query, rolls back unconditionally).
# DML inner statements also require allow_mutate: true.
allow_explain_analyze: false

# Schema allowlist for introspection tools.
# When set, only these schemas appear in introspection results.
# Does not affect mutation tools.
# allowed_schemas:
#   - public
#   - tenant_a

# Schema denylist for introspection tools.
# These schemas are excluded from introspection results.
# Defaults to [pg_toast, pg_catalog, information_schema] when unset.
# denied_schemas:
#   - pg_toast
#   - pg_catalog
#   - information_schema

# HTTP transport — serves postgres-mcp over mcp-proxy (SSE) or mcpo (OpenAI REST).
# Copy to your working directory, fill in the config file path, and run:
#   POSTGRES_MCP_TRANSPORT=mcp-proxy docker compose -f docker-compose-http-sample.yml up

services:
  postgres-mcp:
    container_name: postgres-mcp-http
    image: ghcr.io/rthomazel/mcp/postgres:latest
    stdin_open: true
    tty: false
    ports:
      - "8001:8001"
    command: ["--config", "/config/postgres-mcp.yaml"]
    environment:
      # mcp-proxy: native MCP/SSE (for LibreChat, Claude Desktop, MCP-native clients)
      POSTGRES_MCP_TRANSPORT: mcp-proxy
      # mcpo: OpenAI-compatible REST API (for Open WebUI and similar)
      # POSTGRES_MCP_TRANSPORT: mcpo
    volumes:
      # Mount your config file (contains DSN and all settings).
      - ./postgres-mcp.yaml:/config/postgres-mcp.yaml:ro
